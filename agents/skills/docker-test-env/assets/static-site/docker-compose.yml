# Static site served via nginx
# Builds static assets then serves them with nginx
# Usage: docker compose up -d --build --wait

services:
  web:
    build:
      context: .
      # Uses a multi-stage Dockerfile: build stage (Node) -> nginx stage
      # See Dockerfile.example in this directory
      target: serve
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || curl -f http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

