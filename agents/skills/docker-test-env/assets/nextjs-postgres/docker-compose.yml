# Next.js (full-stack) + PostgreSQL + Prisma/Drizzle migrations
# Usage: docker compose up -d --build --wait

services:
  # One-shot migration service — runs before app starts
  migrate:
    build: .
    command: ["npx", "prisma", "migrate", "deploy"]
    # If using Drizzle: command: ["npx", "drizzle-kit", "migrate"]
    # If using custom script: command: ["node", "scripts/migrate.js"]
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-nextjs}
    env_file:
      - path: .env
        required: false
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-nextjs}
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-nextauth-secret-change-in-prod}
      # NEXT_PUBLIC_* vars must be set as build args in Dockerfile if baked at compile time
    env_file:
      - path: .env
        required: false
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || curl -f http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 5
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nextjs}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
